# HybridTransformer 配置文件
# iTransformer + 轻量级Transformer 混合架构

# 模型基本信息
model_name: "HybridTransformer"

# 任务类型
task_name: "ultra_short_term_forecast"

# 时间序列参数
seq_len: 96      # 输入序列长度
label_len: 0     # 标签长度
pred_len: 8      # 预测长度

# 输入输出特征
n_input_features: 1  # 输入特征数 (目标变量)
enc_in: 1            # 编码器输入特征数
dec_in: 1            # 解码器输入特征数
c_out: 1             # 输出特征数

# Transformer参数
e_layers: 1      # iTransformer分支的Encoder层数
d_layers: 1      # Decoder层数 (未使用)
d_model: 128     # 模型维度
d_ff: 256        # FFN维度 (通常是d_model的2倍)
n_heads: 8       # iTransformer分支的注意力头数
activation: "gelu"  # 激活函数

# HybridTransformer特有参数
time_branch_layers: 1      # 轻量级Transformer分支的层数 (推荐: 1-2)
fusion_heads: 4            # 交叉注意力的头数 (推荐: 4-8)
time_d_model_ratio: 0.5    # Transformer分支的d_model比例 (0.5 = d_model//2)

# 说明:
# - time_branch_layers: 控制时间建模分支的深度
#   * 1层: 轻量级，速度快 (推荐)
#   * 2层: 更强的时间建模能力
# - fusion_heads: 控制交叉注意力的头数
#   * 4头: 轻量级 (推荐)
#   * 8头: 更强的融合能力
# - time_d_model_ratio: Transformer分支的维度比例
#   * 0.5: 使用d_model//2 (推荐，防止过拟合)
#   * 1.0: 使用完整d_model (参数更多)

# 正则化 (v2.0 优化: 增加dropout防止过拟合)
dropout: 0.3     # Dropout率 (从0.1增加到0.3)
fc_dropout: 0.3  # 全连接层Dropout

# 训练参数 (v2.0 优化: 减小batch size)
batch_size: 64   # 从128减小到64 (小batch有正则化效果)
learning_rate: 0.0001
train_epochs: 100
patience: 10
lradj: "adjust_fuc"  # 学习率调整策略

# 数据参数
freq: "60min"    # 数据频率

# 架构说明:
# 1. iTransformer分支:
#    - 对所有变量建模 (变量是token)
#    - e_layers层Encoder
#    - n_heads个注意力头
#
# 2. 轻量级Transformer分支:
#    - 只对目标时间序列建模 (时间是token)
#    - time_branch_layers层Encoder (默认1层)
#    - n_heads个注意力头
#    - 包含位置编码
#
# 3. 交叉注意力融合:
#    - iTransformer输出作为Query
#    - Transformer输出作为Key和Value
#    - fusion_heads个注意力头
#
# 4. 预测头:
#    - Linear投影到pred_len

# 参数量估算 (v2.0):
# - iTransformer分支: ~187K (与原iTransformer相同)
# - Transformer分支: ~47K (1层Encoder, d_model=64)
# - 交叉注意力: ~66K (fusion_heads=4)
# - 总计: ~300K (比iTransformer增加60%)
#
# v1.0参数量: 346K (过拟合严重)
# v2.0参数量: ~210K (减少39%，防止过拟合)

# 优化建议:
# 1. 如果显存不足:
#    - 减小 d_model (64/96)
#    - 减小 batch_size (64)
#    - time_branch_layers = 1
#    - fusion_heads = 4
#
# 2. 如果速度太慢:
#    - time_branch_layers = 1
#    - fusion_heads = 4
#
# 3. 如果性能不佳:
#    - 增加 e_layers (2)
#    - 增加 time_branch_layers (2)
#    - 增加 fusion_heads (8)
#
# 4. 如果过拟合:
#    - 增大 dropout (0.2)

# 预期效果 (v2.0):
# - 性能: 比iTransformer提升5-10% (Vali Loss: 2.54 → ~2.35)
# - 速度: 比iTransformer慢20-30% (v1.0慢30-50%)
# - 参数: 比iTransformer增加60% (v1.0增加135%)
# - 过拟合: 轻微 (v1.0严重过拟合)
# - 优势: 同时捕捉变量间关系和时间依赖，防止过拟合
#
# v2.0改进:
# - 简化Transformer分支 (d_model: 128 → 64)
# - 增加Dropout (0.1 → 0.3)
# - 减小batch size (128 → 64)
# - 参数量减少39% (346K → 210K)

