# DLinear_Graph 模型配置文件
# 融合图神经网络和DLinear的时间序列预测模型

# 模型基本信息
model_name: "DLinear_Graph"

# 数据相关配置
freq: "60min"

# 时间序列相关
task_name: "ultra_short_term_forecast"
seq_len: 96          # 输入序列时间步
pred_len: 8          # 输出序列时间步
label_len: 0

# DLinear 参数
moving_avg: 25       # 移动平均窗口大小，用于趋势提取
individual: True     # 是否为每个变量使用独立的线性层

# 输入特征配置
n_input_features: 13 # 输入特征数量（变量数）
enc_in: 13
c_out: 1            # 输出特征数（预测目标数）

# GraphBlock 参数
use_graph: True           # 是否使用图模块（False时退化为原始DLinear）
graph_conv_channel: 32    # 图卷积通道数
graph_skip_channel: 64    # 图跳跃连接通道数
gcn_depth: 2              # 图卷积深度（信息传播跳数）
graph_node_dim: 40        # 节点嵌入维度（用于学习邻接矩阵）
graph_propalpha: 0.05     # 图传播混合系数 (alpha * 原始 + (1-alpha) * 传播)

# 两阶段预测参数
enable_two_stage_pred: True  # 是否启用两阶段预测
                             # True: 第一阶段线性粗预测 + 第二阶段MLP精细化预测
                             # False: 传统单阶段线性预测

# 训练参数
dropout: 0.1         # Dropout率
learning_rate: 0.001 # 学习率
batch_size: 128      # 批次大小
train_epochs: 100    # 训练轮数
patience: 10         # 早停容忍轮数
lradj: "OneCycleLR"  # 学习率调整策略

# 优化建议
# 1. 如果变量数较多（>20），可以增加 graph_conv_channel 到 64
# 2. 如果数据周期性明显，可以调整 moving_avg (15-35)
# 3. 如果过拟合，增加 dropout 到 0.2-0.3
# 4. 消融实验时，设置 use_graph: False 对比效果
