#    fusion_type: "add"    # 加权融合

# ===== 预期效果 =====
# - 性能: 比iTransformer_DLinear v2提升3-5% (双向时间建模)
# - 速度: 比v2慢15-20% (增加了双向卷积)
# - 优势:
#   1. 变量建模 (iTransformer)
#   2. 双向时间建模 (正向+反向)
#   3. 自适应融合 (门控机制)
#   4. 时间序列分解 (DLinear)
# - 适用: 单变量/多变量预测，特别适合有明显时间依赖的序列

# ===== 核心优势 =====
# 1. 保留iTransformer的变量建模能力
# 2. **双向时间建模**: 同时捕捉正向和反向的时间依赖
# 3. **自适应融合**: 门控机制自动学习正向和反向的权重
# 4. 时间序列分解能力 (趋势 + 季节性)
# 5. 易于消融实验 (enable_bidirectional开关)
# 6. 灵活的融合策略 (gate/concat/add)
# 7. 参数量可控 (通过temporal_hidden_dim调整)

# ===== 双向时间建模的优势 =====
# 1. 捕捉双向依赖: 光伏功率既受历史影响，也受未来天气预报影响
# 2. 更鲁棒: 正向和反向互补，减少单向建模的偏差
# 3. 更灵活: 门控融合自动学习最优权重
# 4. 易于解释: 可以分析正向和反向的贡献

