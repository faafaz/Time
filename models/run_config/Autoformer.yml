# 模型基本信息
model_name: "Autoformer"

# 数据相关配置
freq: "15min"

# 时间序列相关
task_name: "short_term_forecast"
seq_len: 96      # 输入序列时间步
pred_len: 16     # 输出序列时间步
label_len: 0
moving_avg: 25   # window size of moving average
factor: 3        # attn factor


# 网络结构参数
enc_in: 1
e_layers: 2
dec_in: 1
d_layers: 1
c_out: 1
enc_embedding: "DataEmbedding_wo_pos"
dec_embedding: "DataEmbedding_wo_pos"
embed_type: "timeF"  # options: [timeF, fixed, learned]
d_model: 512
d_ff: 2048
n_heads: 8


dropout: 0.05
activation: "gelu"
