# 优化版iTransformerPlus配置文件
# 针对细节处理模块的优化配置

model_id: 'iTransformerPlus_optimized'
model: 'iTransformerPlus'

# 数据配置
data: 'custom'
root_path: './datasets/'
data_path: 'datasets/'
features: 'M'  # 多变量预测
target: 'OT'  # 目标变量
freq: 'h'     # 时间频率

# 序列长度配置
seq_len: 96
label_len: 48
pred_len: 96

# 模型参数
enc_in: 7
dec_in: 7
c_out: 1
d_model: 512
n_heads: 8
e_layers: 2
d_layers: 1
d_ff: 2048
moving_avg: 25
factor: 1
distil: True
dropout: 0.05
embed: 'timeF'
activation: 'gelu'
output_attention: False

# 优化后的细节处理参数
detail_kernel_sizes: [3, 7, 15]  # 多尺度细节提取的核大小
detail_dropout: 0.1              # 细节处理模块的dropout率

# 训练参数
num_workers: 10
itr: 1
train_epochs: 10
batch_size: 32
patience: 3
learning_rate: 0.0001
des: 'exp'
loss: 'MSE'
lradj: 'type1'
use_amp: False

# 设备配置
use_gpu: True
gpu: 0
use_multi_gpu: False
devices: '0,1,2,3'

# 其他配置
checkpoints: './checkpoints/'
