# 模型基本信息
model_name: "TimesNet"

# 数据相关配置
freq: "15min"
task_name: "short_term_forecast"

# 时间序列相关
seq_len: 96      # 输入序列时间步
pred_len: 16     # 输出序列时间步
label_len: 0



# 网络结构参数
enc_in: 1
c_out: 1
embed_type: 0
embed: "timeF"  # options: [timeF, fixed, learned]
e_layers: 2
dropout: 0.05

# TimesNet特有参数
top_k: 5
num_kernels: 6  # for Inception
d_model: 32
d_ff: 32

