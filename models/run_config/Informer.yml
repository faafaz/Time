# 模型基本信息
model_name: "Informer"

# 数据相关配置
freq: "15min"

# 时间序列相关
task_name: "short_term_forecast"
seq_len: 96      # 输入序列时间步
label_len: 0
pred_len: 16     # 输出序列时间步


# 网络结构参数
enc_in: 1
dec_in: 1
c_out: 1
embed_type: "fixed"  # options: [timeF, fixed, learned]
n_heads: 8
e_layers: 2
d_layers: 1
d_model: 512
d_ff: 2048
dropout: 0.05
factor: 1        # attn factor
activation: "gelu"
distil: true     # 蒸馏（distilling）技术

