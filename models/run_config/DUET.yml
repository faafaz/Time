# 模型基本信息
model_name: "DUET"

# 时间序列相关
task_name: "ultra_short_term_forecast"
seq_len: 96      # 输入序列时间步
label_len: 0
pred_len: 16     # 输出序列时间步

# 网络结构参数
n_input_features: 1
enc_in: 1        # 输入特征数
dec_in: 1        # 解码器输入特征数
c_out: 1         # 输出特征数
dropout: 0.1
fc_dropout: 0.2

# DUET特有参数
CI: true         # 通道独立性
num_experts: 4   # 专家数量
k: 2             # 聚类数量
patch_len: 16    # 分块长度

# Transformer相关参数
e_layers: 2      # 编码器层数
d_layers: 1      # 解码器层数
d_model: 512     # 模型维度
d_ff: 2048       # 前馈网络维度
n_heads: 8       # 注意力头数
factor: 5        # 注意力因子
activation: "gelu"  # 激活函数

# 训练参数
batch_size: 32
learning_rate: 0.001
patience: 10
train_epochs: 100
lradj: "type3"   # 学习率调整策略
loss: "huber"    # 损失函数

# 其他参数
use_gpu: true
gpu: 0
num_workers: 0