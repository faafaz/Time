# iTransformer_xLSTM 配置文件 (v7 - 2层单向LSTM参数共享)
# 混合架构: iTransformer编码器 + sLSTM/GRU时间建模
#
# 新功能 (v7):
# 1. 2层单向LSTM参数共享: 固定2层单向LSTM，两层之间共享参数 (NEW in v7)
# 2. 简化iTransformer: 轻量级变量关系建模
# 3. 可学习特征选择: GFLU/Channel Attention/VSN 三种方法
# 4. 目标变量直通路径: 原始目标变量绕过iTransformer，直接与处理后的特征拼接
# 5. sLSTM支持: 使用指数门控的标量LSTM，性能优于GRU
#
# 关键改进:
# 1. 2层单向LSTM参数共享: 增加深度但不增加参数量，类似"深度循环"
# 2. 简化iTransformer: 减少d_model和d_ff，参数减少50-75%
# 3. 使用sLSTM替代LSTM，性能提升10-15%，参数增加约33%
# 4. 可学习特征选择：自动学习变量重要性，参数增加极少（<200）
# 5. 目标直通路径：保留原始时间模式，参数增加极少（+128）

# 模型基本信息
model_name: "iTransformer_xLSTM"

# 任务类型
task_name: "ultra_short_term_forecast"

# 时间序列参数
seq_len: 24      # 输入序列长度
label_len: 0     # 标签长度
pred_len: 8      # 预测长度

# 数据频率
freq: "60min"

# 输入输出特征
enc_in: 13       # 编码器输入特征数（切片前）
dec_in: 13       # 解码器输入特征数
c_out: 13        # 输出特征数

# iTransformer编码器参数
e_layers: 1      # Encoder层数
d_model: 128     # 模型维度 (标准配置)
d_ff: 128        # FFN维度 (标准配置)
n_heads: 8       # 注意力头数
activation: "gelu"  # 激活函数
dropout: 0.1     # Dropout率

# ========== 新功能 0: 简化iTransformer (NEW) ==========
simplify_itransformer: false  # 是否使用简化版iTransformer
simplified_d_model: 64        # 简化版模型维度 (标准: 128)
simplified_d_ff: 64           # 简化版FFN维度 (标准: 128)

# xLSTM/GRU时间建模参数 (v7: 固定2层单向LSTM参数共享)
enable_xlstm: true              # 是否启用RNN（false则使用线性baseline）
rnn_type: "slstm"               # RNN类型: 'slstm' (推荐) 或 'gru' (轻量)
xlstm_hidden: 128               # RNN隐藏层维度
enable_xlstm_longconv: true     # 是否启用LongConv预混合
xlstm_kernels: [5, 11, 23]      # LongConv卷积核大小

# 注意 (v7):
# - LSTM层数固定为2层，两层之间共享参数
# - 移除了双向LSTM机制（enable_bidirectional_lstm, fusion_type, share_params_within_direction）
# - 参数共享始终启用，增加深度但不增加参数量

# ========== 新功能 0.5: NFM分支 (v8新增) ==========
# NFM (Neural Fourier Modelling) 用于从原始目标变量进行频域建模
enable_nfm_branch: false  # 是否启用NFM分支 (默认关闭)
nfm_hidden_dim: 32  # NFM隐藏层维度 (轻量: 24, 平衡: 32, 高性能: 48)
nfm_num_layers: 1  # NFM Mixer层数 (推荐1层，轻量配置)
nfm_hidden_factor: 3  # NFM通道混合扩展因子 (默认3)
nfm_siren_hidden: 32  # SIREN网络隐藏层维度 (默认32)
nfm_omega: 30.0  # SIREN网络频率参数 (默认30.0)
nfm_fusion_type: "gate"  # 融合类型: 'gate' (门控), 'add' (加权), 'concat' (拼接)
nfm_fusion_hidden: 64  # 融合模块隐藏层维度 (仅gate类型使用)

# NFM分支说明:
# - NFM从原始输入数据中提取目标变量 (第0维)
# - 在频域进行建模，捕捉周期性模式
# - 与LSTM分支独立，最后通过轻量融合模块结合
# - 参数增加: ~15K-20K (+9-12%)
# - 预期性能提升: MAE -3% ~ -5%

# ========== 新功能 1: 可学习特征选择 ==========
enable_feature_selection: true  # 是否启用可学习特征选择
feature_selection_type: "gflu"  # 特征选择类型: 'gflu', 'channel_attn', 'vsn'

# GFLU参数 (推荐: 参数极少，稀疏性强)
gflu_sparsity_init: 0.5         # t-softmax初始稀疏度 (0.3-0.7)
gflu_learnable_t: true          # t参数是否可学习

# Channel Attention参数 (备选: 简单有效)
channel_attn_reduction: 4       # MLP降维比例 (2-8)

# VSN参数 (高级: 可解释性强)
vsn_hidden: 64                  # GRN隐藏层大小 (32-128)

# ========== 新功能 2: 目标变量直通路径 ==========
enable_target_bypass: true      # 是否启用目标变量直通路径

# ========== 传统特征选择 (Legacy, 如果enable_feature_selection=false则使用) ==========
# 指定哪些变量索引送入RNN进行时间建模
# 默认: [0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 11, 12] 表示选择12个变量
# 注意: 这些索引是相对于切片后的变量（去掉前2列元数据后）
selected_var_indices: [0, 1, 2, 3, 4, 5, 6, 8, 9, 10, 11, 12]

# 训练参数
batch_size: 128
learning_rate: 0.00001
patience: 10
train_epochs: 100
lradj: "adjust_fuc"  # 学习率调整策略

# 其他参数
embed_type: "timeF"
moving_avg: 11

# GPU配置
use_gpu: true
gpu: 0
num_workers: 0

# ========== 使用说明 (v7) ==========
#
# 1. 核心变化 (v7):
#    - 移除了双向LSTM机制
#    - 固定为2层单向LSTM，两层之间共享参数
#    - 参数共享始终启用，增加深度但不增加参数量
#
# 2. 消融实验配置:
#    - Baseline: enable_feature_selection=false, enable_target_bypass=false
#    - 仅GFLU: enable_feature_selection=true, enable_target_bypass=false
#    - 仅目标直通: enable_feature_selection=false, enable_target_bypass=true
#    - 组合(推荐): enable_feature_selection=true, enable_target_bypass=true
#
# 3. 简化iTransformer配置:
#    - simplify_itransformer=true: 使用简化版iTransformer
#    - simplified_d_model=64: 减少模型维度 (标准: 128)
#    - simplified_d_ff=64: 减少FFN维度 (标准: 128)
#    - 参数减少约50-75%, 速度提升20-30%
#
# 4. 特征选择方法选择:
#    - GFLU: 参数极少(<200), 稀疏性强, 推荐首选
#    - Channel Attention: 简单有效, 快速验证
#    - VSN: 可解释性强, 参数较多(+164k), 工业部署
#
# 5. RNN类型选择:
#    - slstm: 性能优异(+10-15%), 参数适中(+33% vs GRU), 推荐
#    - gru: 轻量级, 参数少, 速度快
#
# 6. 参数调优建议:
#    - 轻量级: rnn_type=gru, xlstm_hidden=96, simplify_itransformer=true
#    - 平衡型: rnn_type=slstm, xlstm_hidden=128 (默认)
#    - 高性能: rnn_type=slstm, xlstm_hidden=256
#
# 7. GFLU稀疏度调优:
#    - sparsity_init越大, 稀疏性越强 (推荐0.3-0.7)
#    - learnable_t=true让模型自动调整稀疏度
#
# 8. 查看特征重要性:
#    训练后, model.last_feature_importance 包含特征重要性权重
#
# 详细文档: docs/iTransformer_xLSTM_v7_2层单向LSTM参数共享.md

